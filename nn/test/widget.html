<!DOCTYPE html>      
<html lang="en">        
 
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />  
<meta name="viewport" content="width=device-width, minimum-scale=1.0" />
<meta name="apple-mobile-web-app-title" content="Test Widget" />
<meta name="description" content="Test Widget" />
<link rel="apple-touch-icon" sizes="180x180" href="../core/assets/plant-icon-192.png" />
<link rel="icon"    type="image/png"         href="../core/assets/plant-icon-96.png" sizes="96x96" />
<link rel="icon"    type="image/svg+xml"     href="../core/assets/plant-icon-96.svg" />
<link rel="shortcut icon"                    href="../core/assets/plant-club.ico" />
<link rel="manifest"                         href="../core/assets/plant_club.webmanifest" />
<link rel="stylesheet" type="text/css"       href="../core/css/core.css" />
<title>Test Widget</title>
</head>

<body>
<script type="text/javascript"   src='../core/js/common_functions.js'> </script>
<script type="text/javascript"   src='../core/js/store.js'> </script>
<script>
let winurlstr         = window.location.href;
let winurlsearchstr   = window.location.search;
let winurlexsearchstr = winurlstr.replace(winurlsearchstr,'');
let winurlparams      = new URLSearchParams(winurlsearchstr.substring(1));

appState       = buildStateFromParams(winurlparams);
 
// --- GLOBAL SETTINGS ---
let globalDelayOffset = 0; // Tracks the 1-second stagger for rapid clicks

// 1. Load the iNaturalist script once at the start
let script = document.createElement('script');
script.src = "https://glauberramos.github.io/inat/inat-widget.js"; 
document.body.appendChild(script);

function addLink( p, project_title, project_id ) {
   let isLoaded = false;

   let toggleLink = faddelemLocal('a', p, {
      href: '#',
      innerText: 'View ' + project_title + ' ↓',
      style: { color: '#007bff', textDecoration: 'underline', cursor: 'pointer', display: 'block', margin: '10px 0', fontWeight: 'bold' }
   });

   // Create an EMPTY container first
   let widgetContainer = faddelemLocal('div', p, {
      style: { display: 'none', marginTop: '10px', border: '1px solid #eee', padding: '10px' }
   });

   toggleLink.onclick = function(e) {
      e.preventDefault();
      
      if (widgetContainer.style.display === 'none') {
         widgetContainer.style.display = 'block';

         if (!isLoaded) {
            toggleLink.innerText = 'Loading ' + project_title + '...';

            setTimeout(() => {
               // 1. NOW we inject the HTML inside the container
               widgetContainer.innerHTML = '<div data-inat-widget ' +
                 'data-inat-source="' + project_id + '" ' +
                 'data-inat-source-type="project" ' + 
                 'data-inat-theme="transparent-dark" ' + 
                 'data-inat-title="' + project_title + '" ' + 
                 'data-inat-layout="grid" ' + 
                 'data-inat-limit="9" ' + 
                 'data-inat-compact="true" ' + 
                 'data-inat-order-by="observed_on"></div>';

               // 2. Trigger the global scan to find the newly added HTML
               if (window.iNaturalist && window.iNaturalist.Widgets) {
                   window.iNaturalist.Widgets.create();
                   toggleLink.innerText = 'Hide ' + project_title + ' ↑';
                   isLoaded = true;
               }
            }, globalDelayOffset);

            globalDelayOffset += 1000; 
            setTimeout(() => { globalDelayOffset = 0; }, 2000);
         } else {
            toggleLink.innerText = 'Hide ' + project_title + ' ↑';
         }
      } else {
         widgetContainer.style.display = 'none';
         toggleLink.innerText = 'View ' + project_title + ' ↓';
      }
   };
}
 
function buildMenu( config ) {
 
    // Create the main navbar container
    let navbar = document.createElement('div');
    navbar.className = 'navbar v2-menu';

    let baseUrl = window.location.origin + window.location.pathname;

    // Build the Home Link
    let homeState = clearForGardenListParams(appState);
    buildNavHome( navbar, baseUrl, homeState );

    // Append the DOM nodes to the body
    faddelem('p', document.body).appendChild(navbar);
}

function faddelemLocal(etype,eparent=null,eattributes={}) { 
   let eobj = document.createElement(etype);
   for (let [key,value] of Object.entries(eattributes)) {
      if ( typeof value === 'object' && value !== null ) {
         for (let [subkey,subvalue] of Object.entries(value)) { eobj[key][subkey] = subvalue; };
      }
      else { eobj[key] = value; };
    };
   if (eparent) { eparent.appendChild(eobj); };
   return eobj;
}
 
function buildPage(config) {
   buildMenu(config);
   let p = faddelemLocal('p', document.body);

   // a one second delay is added between clicks so it's ok to add as 
   // many as we want.
   addLink(p, 'Casual Woodland Garden', 'casual-woodland-garden');
   addLink(p, 'Britton Woods', 'britton-woods');
}
 
</script>
<script type="text/javascript"   src="../core/js/ConfigManager.js"></script>
<script>
 
async function gatherResources() {
  let json_path = json_root + getParams(appState);
 
  try {
      // Await the result of getObservations() and store the actual data
      const config  = await asyncGetConfiguration( json_path, getComponent(appState) );
     
      // Pass the data to the buildPage function
      buildPage(config); 
    } catch (error) {
      console.error("An error occurred:", error);
      faddelem('p',document.body,{innerHTML:('<span id="error">&#9888;<br>' + error.message + '</span>')}); 
      throw error;
    }
}

let message = validateGarden(appState);
 
if( message ) {
    faddelem('p',document.body,{innerHTML:('<span id="error">&#9888;<br>' + message + '</span>')}); 
} else {
    gatherResources(); 
}
 
</script>
</body>
</html>
