<!DOCTYPE html>           
<html lang="en">        
    
<head> 
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />       
<meta name="apple-mobile-web-app-title" content="Regulatory Categories" /> 
<meta name="viewport" content="width=device-width, minimum-scale=1.0" />  
<meta name="description" content="Regulatory Categories" />
<link rel="apple-touch-icon" sizes="180x180" href="../core/assets/plant-icon-192.png" />
<link rel="icon"    type="image/png"         href="../core/assets/plant-icon-96.png" sizes="96x96" />
<link rel="icon"    type="image/svg+xml"     href="../core/assets/plant-icon-96.svg" />
<link rel="shortcut icon"                    href="../core/assets/plant-club.ico" />
<link rel="manifest"                         href="../core/assets/plant_club.webmanifest" />
<meta name="apple-mobile-web-app-capable"    content="no">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="stylesheet" type="text/css"       href="../core/css/core.css" />
<title>Regulatory Categories</title>
</head>

<body>
<script type="text/javascript"   src='../core/js/common_functions.js'> </script>
<script type="text/javascript"   src='../core/js/store.js'> </script>
<script>
let winurlstr = window.location.href;
let winurlsearchstr = window.location.search;
let winurlexsearchstr = winurlstr.replace(winurlsearchstr,'');
let winurlparams  = new URLSearchParams(winurlsearchstr.substring(1));
let p_hide_dash    = winurlparams.get('hide_dash') || 'no';

appState       = buildStateFromParams(winurlparams);

// page / api specific constants 
const CONST_CUSTOM_PLANT   = 'Plant';
  
function getPlaceName( config, place_id ) {
   let place_name = 'Place';

   for( let i=0; i<config.places.length; i++ ) {
        if( place_id === config.places[i].placeId ) {
            place_name = config.places[i].placeName; 
        }
   }
   return place_name;
}

function buildMenu( config, results ) {

    // Create the main navbar container
    let navbar = document.createElement('div');
    navbar.className = 'navbar v2-menu';

    let baseUrl = window.location.origin + window.location.pathname;

    if( p_hide_dash === 'yes' ) {
        let title = getPlaceMenuName(appState) || config.getSubTitle() || config.title;        
        buildNavTitle( navbar, title );
        faddelem('p', document.body).appendChild(navbar);
        return;
    }

    // if place filters were set in the configuration
    if( config.places && config.places.length > 0 ) {
        buildNavDDPlace( navbar, CONST_PLACE, results, config, baseUrl );
    }

    // Build the Home Link
    let homeState = clearForDashParams(appState);
    let homeUrl = '../admin/dashboard.html';
    buildNavHome( navbar, homeUrl, homeState );

    // Append the DOM nodes to the body
    faddelem('p', document.body).appendChild(navbar);
}

function buildPage(xobj, config) {
   let results = xobj.results;
   let box_array = [];

   buildMenu( config, results );

   if (results) {
      let total_results = xobj.total_results;
      let per_page = xobj.per_page;
      let page_curr = xobj.page;
      let page_max = Math.ceil(total_results/per_page);
      let page_prev = ((page_curr>1)?page_curr-1:null);
      let page_next = ((page_curr<page_max)?page_curr+1:null);

      let labels = [
            {innerText:'#'},
            {innerText:'Photo'},
            {innerText:'Name'}, 
      ];

      let title_1 = '', title_2 = '', title_3 = '';

      if( p_hide_dash === 'no' ) {
          title_3 = getPlaceMenuName(appState) || config.getSubTitle() || config.title;
      }
      
      let header = buildHeader( CONST_SPECIES, total_results, per_page, page_curr, page_max, title_1, title_2, title_3 ); 
    
      faddelem('p', document.body).appendChild(header);

      let table = faddelem('table',document.body,{id:'main'});                    
      let thead = faddelem('thead',table);
      let hrow  = faddelem('tr',thead);
      
      faddelems('th',hrow,labels);
      let tbody = faddelem('tbody',table);

      // may need to revisit this if species_guess is ever null
      //results = sortWithNull(results);

      for( let j=0; j<config.taxa.length; j++ ) {
           for( let i=0; i<results.length; i++ ) {
                let rec  = results[i];
                if( config.taxa[j].taxonId.toString() === rec.id.toString() ) {
                    let brow = faddelem('tr',tbody);
                    let header_name = '';

                    // Column: Index
                    faddelem('td', brow, { textContent: j + 1 });

                    let iconic_taxon_name = rec.iconic_taxon_name || '';
                    let pref_tax_name = rec.preferred_common_name || '';
                    header_name = pref_tax_name || tax_name || '';
                    
                    // Column: Species Pic
                    let tdPhoto = faddelem('td', brow);
    
                    if( rec.default_photo ) {
                        faddelem('img', tdPhoto, { className: 'icon', src: rec.default_photo.square_url });
                    } else {
                        faddelem('div', tdPhoto, { className: 'clipart', html: config.utf8 });
                    }
                                     
                    // Column: Name 
                    let urlState = appState;
                    urlState = setPage(urlState, '');
                    urlState = setTaxonId(urlState, '');
                    urlState = setTaxonName(urlState, '');
                    urlState = setPlantId(urlState, rec.id);
                    urlState = setPlantName(urlState, header_name||'?');
                    let url      = './garden_activity.html' + buildParameterList(urlState);

                    let tdName = faddelem('td', brow);
                    let a = faddelem('a', tdName, { href: url });
    
                    // Regulatory Name 
                    faddelem('span', a, { style: { fontSize: 'larger' }, textContent: (config.taxa[j].taxonName).toLowerCase() });
                }
           }
      }

      // buttons to go to prev or next page
      let nav = faddelem('div',document.body,{id:'nav'});
      (page_curr<=1)?faddelem('span',nav,{classList:'button_inactive',title:'already on first page',innerHTML:'&laquo'}):faddelem('a',nav,{classList:'button',title:'first page',id:'button_first',innerHTML:'&laquo',href:fpageurl(winurlexsearchstr,winurlparams,per_page,1)});
      (page_prev===null)?faddelem('span',nav,{classList:'button_inactive',title:'no previous page',innerHTML:'&#8249'}):faddelem('a',nav,{classList:'button',title:'previous page',id:'button_prev',innerHTML:'&#8249',href:fpageurl(winurlexsearchstr,winurlparams,per_page,page_prev)});
      (page_next===null)?faddelem('span',nav,{classList:'button_inactive',title:'no next page',innerHTML:'&#8250'}):faddelem('a',nav,{classList:'button',title:'next page',id:'button_next',innerHTML:'&#8250',href:fpageurl(winurlexsearchstr,winurlparams,per_page,page_next)});
      (page_curr>=page_max)?faddelem('span',nav,{classList:'button_inactive',title:'already on last page',innerHTML:'&raquo'}):faddelem('a',nav,{classList:'button',title:'last page',id:'button_last',innerHTML:'&raquo',href:fpageurl(winurlexsearchstr,winurlparams,per_page,page_max)});
   }
   else { faddelem('p',document.body,{innerText:'No results returned.'}); }; 
}; 
</script>

<script type="text/javascript"   src="../core/js/ConfigManager.js"></script>
<script type="text/javascript"   src="../core/js/api_fetch.js"></script>

<script>
function setupAPIParams( config ) {
   let api_params = '';
   let id_list = '';

   if( config.taxa && config.taxa.length > 0 ) {
       for( let i=0; i<config.taxa.length; i++ ) {
            id_list += config.taxa[i].taxonId + ',';
       }
   }

   if( id_list === '' ) {
       return null;
   }
    
   api_params += '?id='+id_list;
   api_params += getPageParam(appState, '&page=');

   api_params += '&per_page='+CONST_OBSERVATIONS_PER_PAGE;
 
   return api_params;
}
   
async function gatherResources() {
  let api_base  = 'https://api.inaturalist.org/v1/taxa';
  let json_path = json_root + getParams(appState);
 
  try {
   
      // Await the result of getObservations() and store the actual data
      const config  = await asyncGetConfiguration( json_path, getComponent(appState), getStudyTitle(appState) );

      console.log('config ' + JSON.stringify(config) ) ;
      const api_params    = setupAPIParams( config );
      const api_url       = api_base+api_params;
      console.log('api url: ' + api_url);
      let obs_data = '';

      if( api_params ) {
          obs_data      = await apiFetch( api_url );
      }
     
      // Pass the data to the buildPage function
      buildPage(obs_data, config); 

    } catch (error) {
      console.error("An error occurred:", error);
      faddelem('p',document.body,{innerHTML:('<span id="error">&#9888;<br>' + error.message + '</span>')}); 
      throw error;
    }
}

gatherResources(); 
 
</script>
</body>
</html>
