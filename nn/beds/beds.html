<style>
  /* 1. THE GUTTER FRAME */
  body {
    padding-left: 2%;
    padding-right: 2%;
    margin: 0;
    box-sizing: border-box;
  }

  /* 2. THE ALIGNMENT */
  #main, .navbar, .top-bar, #divhead, #header, p, img {
    width: 100%;
    max-width: 700px;
    margin-left: 0;
    margin-right: 0;
    box-sizing: border-box;
  }

  /* 3. THE TOP BAR */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: stretch;
    gap: 10px;
    margin-bottom: 10px;
  }

  /* 4. THE BOXES: Fixed horizontal scroll and standard styling */
  #stats, #dltest {
    display: block;
    box-sizing: border-box;
    max-height: 64px;
    overflow-y: auto;
    overflow-x: hidden; 
    width: fit-content;
    white-space: nowrap;
    border: 2px solid var(--color-border);
    border-radius: 5px;
    padding: 3px 8px;
    background: var(--color-base);
    line-height: 1.2;
    color: var(--color-text);
    font: 14px Sans-Serif;
  }

  /* 5. THE SHIELD: Reset internal table tags and remove ALL default underlines */
  #stats table, #stats td, #stats tr,
  #dltest table, #dltest td, #dltest tr {
    border: none;
    background: transparent;
    padding: 0 12px 0 0; /* Extra 12px padding to the right for breathing room */
    box-shadow: none;
    color: inherit;
    font: inherit;
    text-decoration: none; /* KILLS ALL UNDERLINES IN ALL ROWS */
    margin: 0; 
    border-collapse: collapse;
  }

  /* KILL UNDERLINES FOR ALL LINKS IN THE BOXES */
  #stats a, #dltest a {
    color: var(--color-text-link);
    text-decoration: none; 
  }

  /* RE-ADD UNDERLINE: Only for the very first row of the right box (#dltest) */
  /* This ensures text-only headers are underlined, but URLs remain clean */
  #dltest tr:first-child td {
    text-decoration: underline;
  }

  /* 6. NAVBAR */
  .navbar {
    background-color: var(--color-brand);
    border-radius: 5px;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    align-items: center;
    min-height: 40px;
    overflow: hidden;
  }

  /* Original Helpers */
  #h2 { font-weight:bold; font-size:20px; }
  p { width:100%; }
</style>
<body>
<script type="text/javascript"   src='../core/js/common_functions.js'> </script>
<script type="text/javascript"   src='../core/js/store.js'> </script>
<script>
let winurlstr = window.location.href;
let winurlsearchstr = window.location.search;
let winurlexsearchstr = winurlstr.replace(winurlsearchstr,'');
let winurlparams  = new URLSearchParams(winurlsearchstr.substring(1));
let p_hide_dash    = winurlparams.get('hide_dash') || 'no';
let p_mode         = winurlparams.get('mode') || '';

appState       = buildStateFromParams(winurlparams);
appState       = setComponent(appState, 'beds');

let image_name = '';

// page / api specific constants 
const CONST_CUSTOM_PLANT   = 'Plant';
  
function getPlaceName( config, place_id ) {
   let place_name = 'Place';

   for( let i=0; i<config.places.length; i++ ) {
        if( place_id === config.places[i].placeId ) {
            place_name = config.places[i].placeName; 
        }
   }
   return place_name;
}

function buildMenu( config, results ) {

    // Create the main navbar container
    let navbar = document.createElement('div');
    navbar.className = 'navbar v2-menu';

    let baseUrl = window.location.origin + window.location.pathname;

    // build cultivated beds drop down
    if( config.beds && config.beds.length > 0 ) {
        let links = [];
        for( let i=0; i<config.beds.length; i++ ) {

             let urlState = appState;
             urlState = setGarden(urlState, config.beds[i].bedName);
             let lnk  = faddelem('a', null, { href: './beds.html' + buildParameterList(urlState), textContent: config.beds[i].bedName });

             links.push(lnk);
        }
        buildNavDD( navbar, 'Choose Bed', links );
    }

    // Build the Home Link
    if( p_hide_dash !== 'yes' ) {
        let homeState = clearForDashParams(appState);
        let homeUrl = '../admin/dashboard.html';
        buildNavHome( navbar, homeUrl, homeState );
    }

    // Append the DOM nodes to the body
    faddelem('p', document.body).appendChild(navbar);
}

function buildPage(xobj, config) {
   let results = xobj.results;
   let box_array = [];

   buildMenu( config, results );

   // Look for your main structural container instead of the body root 
   const mainContainer = document.getElementById('main') || document.body; 
   const header = faddelem('p', mainContainer); 

   // Clear layout overrides; let the element use your new CSS rules natively
   header.removeAttribute('style'); 

   const img = document.createElement('img'); 
   img.src = './artwork/' + image_name; 

   // Only apply visual/scaling behavior, NOT layout-breaking width constraints
   img.style.height = 'auto'; 
   img.style.borderRadius = '5px'; 
   img.style.objectFit = 'contain'; // Still needed to override that old global 'cover' property

   header.appendChild(img);

   if( p_mode === 'imageonly' ) {
       return;
   }

   if (results) {
      let total_results = xobj.total_results;
      let per_page = xobj.per_page;
      let page_curr = xobj.page;
      let page_max = Math.ceil(total_results/per_page);
      let page_prev = ((page_curr>1)?page_curr-1:null);
      let page_next = ((page_curr<page_max)?page_curr+1:null);

      let labels = [
            {innerText:'#'},
            {innerText:'Photo'},
            {innerText:'Name'}, 
      ];

      if( p_mode === 'activity' ) {
          labels.push({innerText:'Activity', style: 'text-align: center;'});
      }

      /*let title_1 = '', title_2 = '', title_3 = '';

      if( p_hide_dash === 'no' ) {
          title_3 = getPlaceMenuName(appState) || config.getSubTitle() || config.title;
      }
      
      let header = buildHeader( CONST_SPECIES, total_results, per_page, page_curr, page_max, title_1, title_2, title_3 ); 
    
      faddelem('p', document.body).appendChild(header);*/

      let table = faddelem('table',document.body,{id:'main'});                    
      let thead = faddelem('thead',table);
      let hrow  = faddelem('tr',thead);
      
      faddelems('th',hrow,labels);
      let tbody = faddelem('tbody',table);

      // may need to revisit this if species_guess is ever null
      results = sortWithNull(results);
    
      for (let i=0; i<results.length; i++) {
         let rec  = results[i];
         let brow = faddelem('tr',tbody);
         let header_name = '';

         // Column: Index
         faddelem('td', brow, { textContent: i + 1 });

         if( rec.taxon ) {
             let tax_name = rec.taxon.name || '';
             let pref_tax_name = rec.taxon.preferred_common_name || '';
             header_name = pref_tax_name || tax_name || '';
             // Column: Species or Observation Pic
             if( config.usePlantProjectImages && config.usePlantProjectImages === 'yes' ) {
                 buildObsPhoto( brow, rec );
             } else {
                 buildSpeciesPhoto( brow, rec );
             }
            
             // Column: Name 
             let urlState = appState;
             urlState = setPage(urlState, '');
             urlState = setTaxonId(urlState, rec.taxon.id);
             urlState = setTaxonName(urlState, '');
             urlState = setPlantId(urlState, rec.taxon.id);
             urlState = setPlantName(urlState, header_name||'?');
             let url      = './beds_grid.html' + buildParameterList(urlState);
             buildSpeciesName( brow, rec, url );

             if( p_mode === 'activity' ) {
                 // Split the string into an array and trim any accidental whitespace
                 let taxonIdArray = (config.activityTaxonIds || '').split(',').map(id => id.trim());
                 if( rec?.taxon?.id && taxonIdArray.includes(String(rec.taxon.id)) ) {
                     // Column: wildlife activity
                     urlState = appState;
                     urlState = setPage(urlState, '');
                     urlState = setTaxonId(urlState, '');
                     urlState = setTaxonName(urlState, '');
                     urlState = setComponent(urlState, COMPONENT_GARDEN);
                     urlState = setPlantId(urlState, rec.taxon.id);
                     urlState = setPlantName(urlState, header_name||'?');
                     let activity_url      = '../garden/garden_activity.html' + buildParameterList(urlState);
                     let tdPhoto = faddelem('td', brow, { style: 'text-align: center;' });

                     // Create the anchor link pointing to the wildlife activity url
                     let aLink = faddelem('a', tdPhoto, { href: activity_url, style: 'text-decoration: none;' });
                     faddelem('div', aLink, { textContent: '\u{1FAB2}', style: 'font-size: 1.5rem; display: inline-block; vertical-align: middle;' });                     
                     //faddelem('div', aLink, { textContent: '\u{1FAB2}', style: 'font-size: 1.5rem; text-align: center;' });
                 } else {
                     faddelem('td', brow, { textContent: '', style: 'text-align: center;' });
                 }
             }
         }
      };

      // buttons to go to prev or next page
      let nav = faddelem('div',document.body,{id:'nav'});
      (page_curr<=1)?faddelem('span',nav,{classList:'button_inactive',title:'already on first page',innerHTML:'&laquo'}):faddelem('a',nav,{classList:'button',title:'first page',id:'button_first',innerHTML:'&laquo',href:fpageurl(winurlexsearchstr,winurlparams,per_page,1)});
      (page_prev===null)?faddelem('span',nav,{classList:'button_inactive',title:'no previous page',innerHTML:'&#8249'}):faddelem('a',nav,{classList:'button',title:'previous page',id:'button_prev',innerHTML:'&#8249',href:fpageurl(winurlexsearchstr,winurlparams,per_page,page_prev)});
      (page_next===null)?faddelem('span',nav,{classList:'button_inactive',title:'no next page',innerHTML:'&#8250'}):faddelem('a',nav,{classList:'button',title:'next page',id:'button_next',innerHTML:'&#8250',href:fpageurl(winurlexsearchstr,winurlparams,per_page,page_next)});
      (page_curr>=page_max)?faddelem('span',nav,{classList:'button_inactive',title:'already on last page',innerHTML:'&raquo'}):faddelem('a',nav,{classList:'button',title:'last page',id:'button_last',innerHTML:'&raquo',href:fpageurl(winurlexsearchstr,winurlparams,per_page,page_max)});
   }
   else { faddelem('p',document.body,{innerText:'No results returned.'}); }; 
   
}; 
</script>

<script type="text/javascript"   src="../core/js/BedsManager.js"></script>
<script type="text/javascript"   src="../core/js/api_fetch.js"></script>

<script>
function setupAPIParams( config ) {
   let api_params = '';
 
   api_params += '?project_id='+config.project;

   if( config.plantIds )          { api_params += '&id='       + config.plantIds;  }
   if( config.userId )            { api_params += '&user_id='  + config.userId; }

   // use the taxon_id(s) from the config when present.
   if( config.beds ) { 
       for( let i=0; i<config.beds.length; i++ ) {
            if( config.beds[i].bedName === (getGarden(appState)||'lake') ) {
                api_params += '&taxon_id=' + config.beds[i].taxonIds; 
                image_name = config.beds[i].image;
            }
       }
   }

   api_params += getPageParam(appState, '&page=');

   if( config.usePlantProjectImages && config.usePlantProjectImages === 'yes' ) {
       api_params += '&per_page='+CONST_OBSERVATIONS_PER_PAGE;
   } else {
       api_params += '&per_page='+CONST_SPECIES_COUNTS_PER_PAGE;
   }
 
   return api_params;
}
   
async function gatherResources() {
  let api_base  = 'https://api.inaturalist.org/v1/observations/species_counts';
  let json_path = json_root + getParams(appState);
 
  try {
   
      // Await the result of getObservations() and store the actual data
      const config  = await asyncGetConfiguration( json_path, getComponent(appState) );

      console.log('config ' + JSON.stringify(config));
     
      const api_params    = setupAPIParams( config );
      const api_url       = api_base+api_params;
      console.log('api url: ' + api_url);
      const obs_data      = await apiFetch( api_url ); 
     
      // Pass the data to the buildPage function
      buildPage(obs_data, config); 

    } catch (error) {
      console.error("An error occurred:", error);
      faddelem('p',document.body,{innerHTML:('<span id="error">&#9888;<br>' + error.message + '</span>')}); 
      throw error;
    }
}

/*let message = validateGardenListParams(appState);
 
if( message ) {
    faddelem('p',document.body,{innerHTML:('<span id="error">&#9888;<br>' + message + '</span>')}); 
} else {*/
    gatherResources(); 
//}
 
</script>
